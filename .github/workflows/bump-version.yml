name: Bump Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version (e.g. 0.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update build.zig.zon
        run: |
          sed -i 's/\.version = "[^"]*"/.version = "${{ inputs.version }}"/' build.zig.zon

      - name: Update npm/package.json
        run: |
          sed -i 's/"version": "[^"]*"/"version": "${{ inputs.version }}"/' npm/package.json

      - name: Commit and tag
        run: |
          git config user.name "github-actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build.zig.zon npm/package.json
          git commit -m "chore: bump version to v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin main --tags
