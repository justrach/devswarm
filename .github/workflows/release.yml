name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-linux:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-linux
            asset: devswarm-x86_64-linux
          - target: aarch64-linux
            asset: devswarm-aarch64-linux
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.15.1
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Build
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }} -Dversion="$VERSION"

      - name: Package
        run: |
          mkdir -p dist
          cp zig-out/bin/devswarm dist/${{ matrix.asset }}
          cd dist && sha256sum ${{ matrix.asset }} > ${{ matrix.asset }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/

  build-macos:
    name: Build ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-macos
            asset: devswarm-x86_64-macos
          - target: aarch64-macos
            asset: devswarm-aarch64-macos
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.15.1
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Build
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }} -Dversion="$VERSION"

      - name: Package
        run: |
          mkdir -p dist
          cp zig-out/bin/devswarm dist/${{ matrix.asset }}
          cd dist && shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/

  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish-npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: npm/bin/

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          cd npm
          npm publish --access public
