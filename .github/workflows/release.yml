name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-linux
            os: ubuntu-latest
            asset: gitagent-mcp-x86_64-linux
          - target: aarch64-linux
            os: ubuntu-latest
            asset: gitagent-mcp-aarch64-linux
          - target: x86_64-macos
            os: macos-13
            asset: gitagent-mcp-x86_64-macos
          - target: aarch64-macos
            os: macos-latest
            asset: gitagent-mcp-aarch64-macos
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.15.1
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Build
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }} -Dversion="$VERSION"
      - name: Package
        run: |
          mkdir -p dist
          cp zig-out/bin/gitagent-mcp dist/${{ matrix.asset }}
          cd dist
          sha256sum ${{ matrix.asset }} > ${{ matrix.asset }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish-npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: npm/bin/

      - name: Set version and publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd npm
          npm version "$VERSION" --no-git-tag-version
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          npm publish --access public
